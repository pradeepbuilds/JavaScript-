Mouse Events
onclick → Runs when you click an element (e.g., button).

ondblclick → Runs when you double-click.

onmouseover → Runs when the mouse pointer moves over an element.

onmouseout → Runs when the mouse pointer leaves an element.

mousemove → Tracks mouse movement across the page.


2. Keyboard Events
onkeydown → Fires when a key is pressed down.

onkeyup → Fires when a key is released.

keypress → Fires when a key is pressed (older, less used now).


3. Form Events
onsubmit → Runs when a form is submitted.

onchange → Runs when the value of an input changes.

onfocus → Runs when an input field gets focus (clicked/selected).

onblur → Runs when an input field loses focus.


4. Window Events
onload → Runs when the page finishes loading.

onresize → Runs when the browser window is resized.

onscroll → Runs when the user scrolls the page.



event.type	Type of event (click, keydown, submit)	Check if it’s a click or keypress
event.target	The element that triggered the event	Get value of input field
event.currentTarget	The element the listener is attached to	Useful in event bubbling
event.key	Which key was pressed	Detect Enter key in forms
event.preventDefault()	Stops default browser action	Prevent form from auto-submitting
event.stopPropagation()	Stops event bubbling	Prevent parent handlers from firing
event.clientX / clientY	Mouse position on screen	Track mouse movement
event.ctrlKey / shiftKey	Whether Ctrl/Shift was pressed	Add shortcuts



timestamp
What it is: The time (in milliseconds) when the event was created.

Use case: Measure how long between two events (like double-click timing or performance tracking).
