JavaScript is synchronous by default

It runs one task at a time, line by line.

Nothing else executes until the current task finishes.

Web APIs make async possible

When you use things like setTimeout, fetch, or DOM events, the browser (Web API) takes over.

These tasks run in the background, outside the main JS engine.

Callback registration

Once the Web API finishes (timer ends, data arrives, event occurs), it registers a callback.

That callback is sent to a queue (waiting line).

Task Queue (Callback Queue)

Normal async tasks like setTimeout or setInterval go here.

They wait until the call stack is empty.

Microtask Queue (High Priority)

Promises (.then, async/await) and MutationObservers go into a special high‑priority queue.

The event loop always checks this queue before the normal task queue.

That’s why Promise.then() runs before setTimeout.

Event Loop

The event loop is the traffic controller.

It constantly checks:

“Is the call stack empty?”

If yes → it moves tasks from the microtask queue first, then from the task queue, into the stack for execution.
